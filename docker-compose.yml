services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9005:9000"
      - "9006:9001"

  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minio minio123; do sleep 1; done;
      /usr/bin/mc anonymous set none local/inventory || true;
      echo '[{"AllowedHeaders": ["*"],"AllowedMethods": ["GET", "PUT", "POST", "HEAD"],"AllowedOrigins": ["*"],"ExposeHeaders": ["ETag"],"MaxAgeSeconds": 3000}]' > /tmp/cors.json
      /usr/bin/mc cors set local/inventory /tmp/cors.json;
      exit 0;
      "

  app:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        APP_COMMIT: ${APP_COMMIT:-unknown}
        APP_BUILD_DATE: ${APP_BUILD_DATE:-unknown}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9005
      S3_BUCKET: inventory
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      BACKUP_SECRET_KEY: development-backup-secret-change-me
    ports:
      - "8086:8080"
    profiles:
      - app

  web:
    build:
      context: frontend
      args:
        WEB_VERSION: ${WEB_VERSION:-dev}
        WEB_COMMIT: ${WEB_COMMIT:-unknown}
    depends_on:
      app:
        condition: service_started
    environment:
      API_PROXY_TARGET: http://app:8080
    ports:
      - "3000:3000"
    profiles:
      - web

  prometheus:
    image: prom/prometheus:v3.12.0
    depends_on:
      app:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    profiles:
      - metrics
