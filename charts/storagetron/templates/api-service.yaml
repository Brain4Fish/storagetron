apiVersion: v1
kind: Service
metadata:
  name: {{ include "storagetron.apiName" . }}
  labels:
    {{- include "storagetron.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "storagetron.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
