name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}

env:
  GOFLAGS: -mod=readonly
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  changes:
    name: Select changed components
    runs-on: k8s-runners
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.select.outputs.backend }}
      frontend: ${{ steps.select.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select components
        id: select
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          backend=false
          frontend=false

          if [ "$EVENT_NAME" != "pull_request" ]; then
            backend=true
            frontend=true
          else
            changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

            while IFS= read -r file; do
              case "$file" in
                .github/*|charts/*|deploy/*|docker-compose.yml)
                  backend=true
                  frontend=true
                  ;;
                cmd/*|internal/*|pkg/*|migrations/*|go.mod|go.sum|Dockerfile|.dockerignore)
                  backend=true
                  ;;
                frontend/*)
                  frontend=true
                  ;;
              esac
            done <<< "$changed_files"
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

          {
            echo "### Selected components"
            echo "- Backend: \`$backend\`"
            echo "- Frontend: \`$frontend\`"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-checks:
    name: Backend checks
    if: ${{ needs.changes.outputs.backend == 'true' }}
    needs: changes
    runs-on: k8s-runners
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check Go formatting
        shell: bash
        run: |
          gofmt -l $(git ls-files '*.go') > /tmp/gofmt.out
          if [ -s /tmp/gofmt.out ]; then
            echo "The following Go files need gofmt:"
            cat /tmp/gofmt.out
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run backend tests
        run: go test ./...

  frontend-checks:
    name: Frontend checks
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    needs: changes
    runs-on: k8s-runners
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend linter
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

  build-backend-image:
    name: Build backend image
    if: ${{ needs.changes.outputs.backend == 'true' }}
    needs: changes
    runs-on: k8s-builder-runners
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        id: image-name
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-api" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image-name.outputs.name }}
          tags: |
            type=ref,event=pr
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
#          cache-from: type=gha,scope=storagetron-api-v1
#          cache-to: type=gha,scope=storagetron-api-v1,mode=max,ignore-error=true
          build-args: |
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
            APP_COMMIT=${{ github.sha }}
            APP_BUILD_DATE=${{ github.event.head_commit.timestamp || 'unknown' }}

      - name: Summarize backend image
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "### Backend image cache"
            echo "- BuildKit scope: \`storagetron-api-v1\`"
            echo "- Result: \`${{ steps.build.outcome }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-frontend-image:
    name: Build frontend image
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    needs: changes
    runs-on: k8s-builder-runners
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        id: image-name
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-web" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image-name.outputs.name }}
          tags: |
            type=ref,event=pr
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore Next.js compiler cache
        id: next-cache
        uses: actions/cache@v4
        with:
          path: frontend/.build-cache/next
          key: next-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/package.json', 'frontend/*.json', 'frontend/**/*.js', 'frontend/**/*.mjs', 'frontend/**/*.ts', 'frontend/**/*.tsx', 'frontend/**/*.css', 'frontend/public/**') }}
          restore-keys: |
            next-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Restore Docker cache mounts
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              "frontend/.build-cache/next": {
                "target": "/app/.next/cache",
                "id": "storagetron-next-v1"
              }
            }
          skip-extraction: ${{ steps.next-cache.outputs.cache-hit }}

      - name: Build frontend image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
#          cache-from: type=gha,scope=storagetron-web-v1
#          cache-to: type=gha,scope=storagetron-web-v1,mode=max,ignore-error=true
          build-args: |
            WEB_VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
            WEB_COMMIT=${{ github.sha }}
            API_PROXY_TARGET=http://localhost:8086

      - name: Summarize frontend image
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "### Frontend image caches"
            echo "- BuildKit scope: \`storagetron-web-v1\`"
            echo "- Exact Next.js cache hit: \`${{ steps.next-cache.outputs.cache-hit == 'true' }}\`"
            echo "- Result: \`${{ steps.build.outcome }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  pr-gate:
    name: PR gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs:
      - changes
      - backend-checks
      - frontend-checks
      - build-backend-image
      - build-frontend-image
    runs-on: k8s-runners
    timeout-minutes: 5
    steps:
      - name: Check PR gate
        shell: bash
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "PR gate passed."

  main-gate:
    name: Main gate
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - changes
      - backend-checks
      - frontend-checks
      - build-backend-image
      - build-frontend-image
    runs-on: k8s-runners
    timeout-minutes: 5
    steps:
      - name: Check main gate
        shell: bash
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "Main gate passed."

  release-checks:
    name: Release checks
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))) }}
    needs:
      - changes
      - backend-checks
      - frontend-checks
      - build-backend-image
      - build-frontend-image
    runs-on: k8s-runners
    timeout-minutes: 5
    steps:
      - name: Validate release checks
        shell: bash
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v1.2.3 or v1.2.3-rc.1."
            exit 1
          fi
          echo "Release checks passed."

  release-gate:
    name: Release gate
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    needs:
      - release-checks
    runs-on: k8s-runners
    timeout-minutes: 5
    environment:
      name: release
    steps:
      - name: Confirm release approval
        run: echo "Release gate approved."

  publish-release-images:
    name: Publish release images
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - release-gate
    runs-on: k8s-builder-runners
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            file: Dockerfile
            cache-scope: storagetron-api-v1
            build-args: |
              APP_VERSION=${{ github.ref_name }}
              APP_COMMIT=${{ github.sha }}
              APP_BUILD_DATE=${{ github.event.head_commit.timestamp || 'unknown' }}
          - name: web
            context: frontend
            file: frontend/Dockerfile
            cache-scope: storagetron-web-v1
            build-args: |
              WEB_VERSION=${{ github.ref_name }}
              WEB_COMMIT=${{ github.sha }}
              API_PROXY_TARGET=http://localhost:8086
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        id: image-name
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image-name.outputs.name }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
#          cache-from: type=gha,scope=${{ matrix.cache-scope }}
#          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max,ignore-error=true
          build-args: ${{ matrix.build-args }}
